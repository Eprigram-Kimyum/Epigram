name: Gemini 3.5 Extended Commit Code Reviewer (Pro)

on:
  push:
    branches:
      - '**' # 모든 브랜치의 푸시(커밋)를 실시간으로 감지합니다.

permissions:
  contents: write # 커밋 댓글 작성을 위해 필요한 최소 권한

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 다중 커밋 및 전체 히스토리 추적을 위해 필수 설정

      - name: Analyze Diff and Call Gemini 3.5 API
        id: gemini_review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 푸시된 모든 커밋의 누적 차이점(diff) 추출
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.event.after }}"

          # 새 브랜치 생성 시 이전 SHA가 없는 경우(000000...)에 대한 예외 처리
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              BEFORE_SHA="HEAD~1"
            else
              echo "비교할 수 있는 이전 커밋 히스토리가 없습니다."
              exit 0
            fi
          fi

          # 코드 리뷰와 무관한 대용량 의존성 잠금 파일 및 빌드 결과물 제외
          git diff $BEFORE_SHA $AFTER_SHA -- . ':(exclude)package-lock.json' ':(exclude)yarn.lock' ':(exclude)dist/*' > diff.txt

          if [ ! -s diff.txt ]; then
            echo "변경된 코드 내용이 없습니다."
            exit 0
          fi

          # 2. 전문 프론트엔드 멘토 프롬프트 및 페이로드 구성
          PROMPT="당신은 전문 프론트엔드 개발자이자 멘토입니다. 다음 git diff 변경 사항을 세밀히 분석하여, 코드의 성능 최적화, 가독성, 잠재적 버그, 그리고 웹 표준/접근성 관점에서 개선할 점을 한국어로 리뷰해 주세요."
          DIFF_CONTENT=$(cat diff.txt)

          # 종량제 등급이므로 고성능 추론 모드인 thinkingLevel: "HIGH"를 안전하게 활성화합니다.
          PAYLOAD=$(jq -n --arg p "$PROMPT" --arg d "$DIFF_CONTENT" \
            '{
              contents: [{parts: [{text: ($p + "\n\n" + $d)}]}],
              generationConfig: {
                thinkingConfig: {
                  thinkingLevel: "HIGH"
                }
              }
            }')

          # 3. Gemini 3.5 Flash API 호출
          echo "Gemini 3.5 Flash Extended 모드로 분석을 시작합니다."
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          # 4. 응답 검증 및 예외 처리
          if echo "$RESPONSE" | jq -e '.candidates[0].content.parts[0].text' >/dev/null 2>&1; then
            REVIEW_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')
          elif echo "$RESPONSE" | jq -e '.error' >/dev/null 2>&1; then
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message')
            REVIEW_TEXT="⚠️ **Gemini API 에러 발생:** $ERROR_MSG"
          else
            REVIEW_TEXT="⚠️ **리뷰 생성 실패:** 예기치 못한 형식의 데이터가 반환되었습니다."
          fi

          # 5. GitHub API를 통해 해당 커밋에 최종 리뷰 댓글 작성
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
            -f body="$REVIEW_TEXT"
