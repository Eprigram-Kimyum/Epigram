name: Gemini Commit Code Reviewer

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Analyze Diff and Call Gemini API
        id: gemini_review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 직전 커밋과의 차이점(diff) 추출
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            git diff HEAD~1 HEAD -- . ':(exclude)package-lock.json' ':(exclude)yarn.lock' ':(exclude)dist/*' > diff.txt
          else
            echo "이전 커밋이 존재하지 않아 비교할 수 없습니다."
            exit 0
          fi

          # 변경 사항이 비어있다면 종료
          if [ ! -s diff.txt ]; then
            echo "변경된 코드 내용이 없습니다."
            exit 0
          fi

          # 2. 제미나이에게 보낼 프롬프트와 코드 병합
          PROMPT="당신은 전문 프론트엔드 개발자이자 멘토입니다. 다음 git diff 변경 사항을 세밀히 분석하여, 코드의 성능 최적화, 가독성, 잠재적 버그, 그리고 웹 표준/접근성 관점에서 개선할 점을 한국어로 친절하게 리뷰해 주세요."
          DIFF_CONTENT=$(cat diff.txt)

          # JSON 페이로드 안전하게 생성 (jq 도구 활용)
          PAYLOAD=$(jq -n --arg p "$PROMPT" --arg d "$DIFF_CONTENT" '{contents: [{parts: [{text: ($p + "\n\n" + $d)}]}]}')

          # Gemini API 호출
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          # 응답 구조 분석 및 에러 핸들링 분기
          if echo "$RESPONSE" | jq -e '.candidates[0].content.parts[0].text' >/dev/null 2>&1; then
            REVIEW_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')
          elif echo "$RESPONSE" | jq -e '.error' >/dev/null 2>&1; then
            # API 자체 에러가 발생한 경우 (예: Rate Limit)
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message')
            REVIEW_TEXT="⚠️ **Gemini API 에러 발생:** $ERROR_MSG"
          else
            # 안전 필터 등으로 차단되었거나 알 수 없는 응답인 경우
            REVIEW_TEXT="⚠️ **리뷰 생성 실패:** 제미나이가 응답을 거부했거나 예기치 못한 형식이 반환되었습니다. (오류 내용: $(echo "$RESPONSE" | jq -c '.' | cut -c1-200)...)"
          fi

          # GitHub API를 통해 댓글 작성
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
            -f body="$REVIEW_TEXT"
