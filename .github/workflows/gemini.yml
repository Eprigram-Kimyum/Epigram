name: Gemini 3.5 Extended Commit Code Reviewer

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Analyze Diff and Call Gemini 3.5 API with Retry
        id: gemini_review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 직전 커밋과의 차이점 추출
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            git diff HEAD~1 HEAD -- . ':(exclude)package-lock.json' ':(exclude)yarn.lock' ':(exclude)dist/*' > diff.txt
          else
            echo "이전 커밋이 존재하지 않아 비교할 수 없습니다."
            exit 0
          fi

          if [ ! -s diff.txt ]; then
            echo "변경된 코드 내용이 없습니다."
            exit 0
          fi

          # 2. 멘토 프롬프트 및 변경 내용 변수화
          PROMPT="당신은 전문 프론트엔드 개발자이자 멘토입니다. 다음 git diff 변경 사항을 세밀히 분석하여, 코드의 성능 최적화, 가독성, 잠재적 버그, 그리고 웹 표준/접근성 관점에서 개선할 점을 한국어로 리뷰해 주세요."
          DIFF_CONTENT=$(cat diff.txt)

          PAYLOAD=$(jq -n --arg p "$PROMPT" --arg d "$DIFF_CONTENT" \
            '{
              contents: [{parts: [{text: ($p + "\n\n" + $d)}]}],
              generationConfig: {
              }
            }')

          # 3. [핵심 개선] 지수 백오프(Exponential Backoff) 적용 자동 재시도 루프
          MAX_RETRIES=3
          RETRY_DELAY=5
          RESPONSE=""

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Gemini API 호출 중... (시도 $i/$MAX_RETRIES)"
            RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${GEMINI_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")

            # 에러 메시지에 'high demand' 또는 'quota' 관련 문구가 없다면 루프 탈출 (정상 작동 혹은 일반 에러)
            if echo "$RESPONSE" | grep -q "experiencing high demand"; then
              if [ $i -lt $MAX_RETRIES ]; then
                echo "⚠️ 서버 과부하 감지. ${RETRY_DELAY}초 후 재시도합니다..."
                sleep $RETRY_DELAY
                RETRY_DELAY=$((RETRY_DELAY * 2)) 
              fi
            else
              break
            fi
          done

          # 4. 응답 검증 및 예외 처리
          if echo "$RESPONSE" | jq -e '.candidates[0].content.parts[0].text' >/dev/null 2>&1; then
            REVIEW_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')
          elif echo "$RESPONSE" | jq -e '.error' >/dev/null 2>&1; then
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message')
            REVIEW_TEXT="⚠️ **Gemini API 에러 발생:** $ERROR_MSG"
          else
            REVIEW_TEXT="⚠️ **리뷰 생성 실패:** 제미나이가 응답을 거부했거나 예기치 못한 형식의 데이터가 반환되었습니다."
          fi

          # 5. GitHub API를 통해 해당 커밋에 최종 리뷰 댓글 작성
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
            -f body="$REVIEW_TEXT"
